<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sri Durga Car Accessories</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#000;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    display:flex; align-items:center; justify-content:center;
    min-height:100vh; padding:16px;
  }
  .app {
    width:100%; max-width:420px; height:680px;
    background:#0a0a0a; border:1px solid #422006;
    border-radius:18px; overflow:hidden;
    display:flex; flex-direction:column;
    box-shadow:0 20px 50px rgba(0,0,0,0.6);
  }
  /* Header */
  .header { background:#000; padding:16px 20px 12px; border-bottom:1px solid #422006; }
  .header-top { display:flex; align-items:center; gap:12px; }
  .logo {
    width:44px; height:44px; border-radius:50%; background:#111;
    border:1px solid #d97706; display:flex; align-items:center;
    justify-content:center; font-size:20px; flex-shrink:0;
  }
  .title-block { flex:1; }
  .divider-row { display:flex; align-items:center; gap:8px; }
  .line { height:1px; flex:1; background:#78350f; }
  .brand { color:#fbbf24; font-size:11px; font-weight:600; letter-spacing:2px; text-transform:uppercase; white-space:nowrap; }
  .subtitle { color:#fffbeb; font-weight:800; font-size:18px; letter-spacing:0.5px; line-height:1.2; }
  .header-bottom { display:flex; align-items:center; justify-content:space-between; margin-top:8px; padding-left:56px; }
  .phone-link { color:#fbbf24; font-size:13px; font-weight:600; text-decoration:none; display:flex; align-items:center; gap:5px; }
  .location { color:#9ca3af; font-size:11px; display:flex; align-items:center; gap:4px; }

  /* List view */
  .list-view { flex:1; overflow-y:auto; background:#030712; }
  .combo-btn { display:block; width:100%; background:none; border:none; text-align:left; padding:16px 16px 8px; cursor:pointer; }
  .combo-card {
    position:relative; border-radius:16px;
    background:linear-gradient(135deg,#fbbf24,#b45309);
    padding:16px; overflow:hidden;
  }
  .combo-badge {
    position:absolute; top:8px; right:8px; background:#000; color:#fcd34d;
    font-size:10px; font-weight:700; text-transform:uppercase;
    padding:4px 8px; border-radius:999px; letter-spacing:0.5px;
  }
  .combo-emoji { font-size:20px; margin-bottom:8px; }
  .combo-name { color:#000; font-weight:800; font-size:17px; line-height:1.25; }
  .combo-desc { color:#1c1917; font-size:12px; margin-top:4px; }
  .combo-price { color:#000; font-weight:800; font-size:21px; margin-top:8px; }

  .section-label {
    padding:12px 16px 8px; color:#9ca3af; font-size:11px;
    text-transform:uppercase; letter-spacing:1px; font-weight:600;
  }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:0 16px 24px; }
  .item-card {
    background:#111827; border:1px solid #1f2937; border-radius:12px;
    padding:12px; text-align:left; cursor:pointer; display:flex;
    flex-direction:column; gap:8px; color:inherit;
  }
  .item-card:hover { background:#1f2937; }
  .item-icon {
    width:36px; height:36px; border-radius:8px; background:#1f2937;
    display:flex; align-items:center; justify-content:center; font-size:16px;
  }
  .item-name { color:#fffbeb; font-weight:600; font-size:13.5px; line-height:1.3; }
  .item-price { color:#fbbf24; font-weight:700; font-size:13.5px; margin-top:2px; }

  /* Detail view */
  .detail-view { flex:1; overflow-y:auto; background:#030712; display:flex; flex-direction:column; }
  .back-btn {
    display:flex; align-items:center; gap:4px; color:#9ca3af; font-size:14px;
    background:none; border:none; padding:16px 16px 8px; cursor:pointer;
  }
  .detail-body { padding:8px 16px; flex:1; }
  .detail-card { background:#111827; border:1px solid #1f2937; border-radius:16px; padding:20px; }
  .detail-icon {
    width:48px; height:48px; border-radius:12px; background:#1f2937;
    display:flex; align-items:center; justify-content:center; font-size:24px; margin-bottom:12px;
  }
  .detail-name { color:#fffbeb; font-weight:700; font-size:20px; line-height:1.3; }
  .detail-price { color:#fbbf24; font-weight:800; font-size:24px; margin-top:8px; }
  .detail-label {
    color:#9ca3af; font-size:11px; margin-top:16px; text-transform:uppercase;
    letter-spacing:1px; font-weight:600;
  }
  .detail-text { color:#fffbeb; font-size:14px; margin-top:4px; line-height:1.5; }
  .order-wrap { padding:8px 16px 16px; }
  .order-btn {
    width:100%; display:flex; align-items:center; justify-content:center; gap:8px;
    background:#22c55e; color:#000; font-weight:700; font-size:14px;
    padding:14px; border-radius:999px; text-decoration:none;
  }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="header-top">
      <div class="logo">🚗</div>
      <div class="title-block">
        <div class="divider-row">
          <span class="line"></span>
          <span class="brand">Sri Durga</span>
          <span class="line"></span>
        </div>
        <div class="subtitle">CAR ACCESSORIES</div>
      </div>
    </div>
    <div class="header-bottom">
      <a href="tel:+919121510602" class="phone-link">📞 9121510602</a>
      <div class="location">📍 We come to your location</div>
    </div>
  </div>

  <div id="listView" class="list-view"></div>
  <div id="detailView" class="detail-view" style="display:none;"></div>
</div>

<script>
  const OWNER_WHATSAPP = "919121510602";

  const CATALOG = [
    { sku: "ACC-01", name: "Android Stereo System", price: 6300, fits: "Universal, most cars", desc: "Touchscreen Android stereo with Bluetooth, navigation support and reverse camera input. Price includes professional fitting.", emoji: "📱" },
    { sku: "ACC-02", name: "Speakers", price: 3000, fits: "Universal", desc: "Upgraded door speakers for clearer, louder sound than stock. Pairs well with the Android stereo.", emoji: "🔊" },
    { sku: "ACC-03", name: "Seat Covers", price: 7000, fits: "Universal", desc: "Premium leather-finish seat covers. Washable, protects against stains, ideal if you have kids or pets.", emoji: "🪑" },
    { sku: "ACC-04", name: "Full Mat (Set)", price: 1500, fits: "Universal", desc: "Full-length floor mat set covering front and rear, keeps mud and dirt off the original carpet.", emoji: "🟫" },
    { sku: "ACC-05", name: "Foot Mats", price: 1200, fits: "Universal", desc: "Basic foot mat set, budget-friendly protection for the footwell area.", emoji: "👟" },
    { sku: "ACC-06", name: "Steering String Cover", price: 300, fits: "Universal", desc: "Stitched string-style steering wheel cover for better grip and a sportier look.", emoji: "🛞" },
    { sku: "ACC-07", name: "Back Guard", price: 2400, fits: "Universal", desc: "Rear guard that protects your bumper from minor knocks while parking or loading.", emoji: "🛡️" },
    { sku: "ACC-08", name: "Window Film", price: 1000, fits: "Universal", desc: "Cuts sun glare and cabin heat, adds privacy to your windows.", emoji: "☀️" },
    { sku: "ACC-09", name: "Door Visor", price: 600, fits: "Universal", desc: "Lets you keep windows cracked open in rain without water coming in. Improves the side profile too.", emoji: "☔" },
    { sku: "ACC-10", name: "Door Step (SS)", price: 600, fits: "Universal", desc: "Stainless steel scuff plates that protect the door sill from shoe scratches.", emoji: "🚪" },
    { sku: "ACC-11", name: "Door Guard", price: 300, fits: "Universal", desc: "Edge guards that absorb minor door-to-door knocks in tight parking.", emoji: "🚧" },
    { sku: "ACC-12", name: "Handle Inner Cover", price: 300, fits: "Universal", desc: "Protects the inner door handle area from finger scratches and wear.", emoji: "✋" },
    { sku: "ACC-13", name: "Handle Chrome Cover", price: 900, fits: "Universal", desc: "Chrome-finish covers for the outer door handles, instantly upgrades the exterior look.", emoji: "✨" },
    { sku: "ACC-14", name: "Horn", price: 600, fits: "Universal", desc: "Louder, sharper horn for better safety on the road.", emoji: "📢" },
    { sku: "ACC-15", name: "Mud Flap", price: 600, fits: "Universal", desc: "Set of mud flaps that keep splashes and mud off the lower body during rain.", emoji: "💧" },
    { sku: "ACC-16", name: "Door Beading", price: 1200, fits: "Universal", desc: "Rubber beading along the door edge, protects against dings and adds a finished look.", emoji: "📏" },
    { sku: "ACC-17", name: "Cleaning Cloth", price: 100, fits: "Universal", desc: "Soft microfiber cloth for dashboard and glass cleaning.", emoji: "🧽" },
  ];

  const COMBO = {
    sku: "COMBO-01",
    name: "Complete Makeover Combo",
    price: 35999,
    desc: "Every accessory above, fitted together as one package — seat covers, stereo, speakers, mats, guards, visors and more. Best value if you're doing a full interior + exterior upgrade in one visit.",
    emoji: "👑",
  };

  function formatPrice(n) {
    return "₹" + n.toLocaleString("en-IN");
  }

  function waLink(item) {
    const msg = encodeURIComponent(
      "Hi Sri Durga Car Accessories, I want to order:\n" + item.name + " (" + item.sku + ") - Rs." + item.price
    );
    return "https://wa.me/" + OWNER_WHATSAPP + "?text=" + msg;
  }

  const listView = document.getElementById("listView");
  const detailView = document.getElementById("detailView");

  function renderList() {
    let html = "";

    html += '<button class="combo-btn" onclick="showDetail(\'' + COMBO.sku + '\')">';
    html += '<div class="combo-card">';
    html += '<div class="combo-badge">Best Value</div>';
    html += '<div class="combo-emoji">' + COMBO.emoji + '</div>';
    html += '<div class="combo-name">' + COMBO.name + '</div>';
    html += '<div class="combo-desc">All 17 accessories, fitted together</div>';
    html += '<div class="combo-price">' + formatPrice(COMBO.price) + '</div>';
    html += '</div></button>';

    html += '<div class="section-label">Or pick a single item</div>';
    html += '<div class="grid">';
    CATALOG.forEach(item => {
      html += '<button class="item-card" onclick="showDetail(\'' + item.sku + '\')">';
      html += '<div class="item-icon">' + item.emoji + '</div>';
      html += '<div><div class="item-name">' + item.name + '</div>';
      html += '<div class="item-price">' + formatPrice(item.price) + '</div></div>';
      html += '</button>';
    });
    html += '</div>';

    listView.innerHTML = html;
  }

  function showDetail(sku) {
    const item = sku === COMBO.sku ? COMBO : CATALOG.find(i => i.sku === sku);
    if (!item) return;

    let html = '<button class="back-btn" onclick="showList()">‹ Back</button>';
    html += '<div class="detail-body"><div class="detail-card">';
    html += '<div class="detail-icon">' + item.emoji + '</div>';
    html += '<div class="detail-name">' + item.name + '</div>';
    html += '<div class="detail-price">' + formatPrice(item.price) + '</div>';
    if (item.fits) {
      html += '<div class="detail-label">Fits</div>';
      html += '<div class="detail-text">' + item.fits + '</div>';
    }
    html += '<div class="detail-label">Details</div>';
    html += '<div class="detail-text">' + item.desc + '</div>';
    html += '</div></div>';
    html += '<div class="order-wrap"><a class="order-btn" href="' + waLink(item) + '" target="_blank" rel="noopener noreferrer">🟢 Order this — WhatsApp</a></div>';

    detailView.innerHTML = html;
    listView.style.display = "none";
    detailView.style.display = "flex";
  }

  function showList() {
    detailView.style.display = "none";
    listView.style.display = "block";
  }

  renderList();
</script>

</body>
</html>
